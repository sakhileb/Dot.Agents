openapi: 3.1.0
info:
  title: Dot.Agents API
  version: 1.0.0
  description: |
    Enterprise AI Workforce Platform API.
    All endpoints require `auth:sanctum` + `org.context` middleware.
    Responses are scoped to the authenticated user's current organization.
  contact:
    name: Dot.Agents Platform
  license:
    name: Proprietary

servers:
  - url: /api/v1
    description: Production API v1

security:
  - bearerToken: []

paths:

  # ─── Authentication ─────────────────────────────────────────────────────────

  /me:
    get:
      summary: Get authenticated user
      operationId: getMe
      tags: [Auth]
      responses:
        '200':
          description: Authenticated user object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthenticated'

  # ─── Agent Catalog ──────────────────────────────────────────────────────────

  /agents:
    get:
      summary: List agent marketplace catalog
      operationId: listAgents
      tags: [Agents]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SearchParam'
        - name: department
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: agent_type
          in: query
          schema:
            type: string
            enum: [advisory, semi-autonomous, autonomous, executive_approval]
      responses:
        '200':
          description: Paginated agent list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAgents'

  /agents/{agent}:
    get:
      summary: Get agent details
      operationId: showAgent
      tags: [Agents]
      parameters:
        - $ref: '#/components/parameters/AgentParam'
      responses:
        '200':
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Deployments ────────────────────────────────────────────────────────────

  /deployments:
    get:
      summary: List org deployments
      operationId: listDeployments
      tags: [Deployments]
      parameters:
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Paginated deployment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDeployments'

    post:
      summary: Deploy an agent
      operationId: createDeployment
      tags: [Deployments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeployAgentRequest'
      responses:
        '201':
          description: Deployment created
          content:
            application/json:
              schema:
                properties:
                  data:
                    $ref: '#/components/schemas/AgentDeployment'
        '422':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  /deployments/{deployment}:
    get:
      summary: Get deployment
      operationId: showDeployment
      tags: [Deployments]
      parameters:
        - $ref: '#/components/parameters/DeploymentParam'
      responses:
        '200':
          description: Deployment detail
          content:
            application/json:
              schema:
                properties:
                  data:
                    $ref: '#/components/schemas/AgentDeployment'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Update deployment
      operationId: updateDeployment
      tags: [Deployments]
      parameters:
        - $ref: '#/components/parameters/DeploymentParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeploymentRequest'
      responses:
        '200':
          description: Updated deployment
          content:
            application/json:
              schema:
                properties:
                  data:
                    $ref: '#/components/schemas/AgentDeployment'

    delete:
      summary: Decommission deployment
      operationId: decommissionDeployment
      tags: [Deployments]
      parameters:
        - $ref: '#/components/parameters/DeploymentParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
      responses:
        '200':
          description: Deployment decommissioned
        '403':
          $ref: '#/components/responses/Forbidden'

  /deployments/{deployment}/pause:
    post:
      summary: Pause deployment
      operationId: pauseDeployment
      tags: [Deployments]
      parameters:
        - $ref: '#/components/parameters/DeploymentParam'
      responses:
        '200':
          description: Deployment paused

  # ─── Skill Catalog ──────────────────────────────────────────────────────────

  /skills:
    get:
      summary: List available skills catalog
      operationId: listSkills
      tags: [Skills]
      parameters:
        - name: department
          in: query
          schema:
            type: string
        - name: risk_level
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: layer
          in: query
          schema:
            type: string
            enum: [core, domain, extended]
        - name: approval_required
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Skill catalog list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentSkill'
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /skills/{skill}:
    get:
      summary: Get skill details
      operationId: getSkill
      tags: [Skills]
      parameters:
        - $ref: '#/components/parameters/SkillParam'
      responses:
        '200':
          description: Skill detail with permissions and requirements
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AgentSkill'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Deployment Skill Assignments ───────────────────────────────────────────

  /deployments/{deployment}/skills:
    get:
      summary: List skills assigned to a deployment
      operationId: listDeploymentSkills
      tags: [Skills]
      parameters:
        - $ref: '#/components/parameters/DeploymentParam'
      responses:
        '200':
          description: Skills assigned to the deployment
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentSkillAssignment'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      summary: Assign a skill to a deployment
      operationId: assignSkill
      tags: [Skills]
      parameters:
        - $ref: '#/components/parameters/DeploymentParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignSkillRequest'
      responses:
        '201':
          description: Skill assigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AgentSkillAssignment'
        '422':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  /deployments/{deployment}/skills/{skill}:
    patch:
      summary: Update skill assignment (enable/disable/configure)
      operationId: updateSkillAssignment
      tags: [Skills]
      parameters:
        - $ref: '#/components/parameters/DeploymentParam'
        - $ref: '#/components/parameters/SkillParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                is_enabled:
                  type: boolean
                config:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Assignment updated
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Skill Execution ────────────────────────────────────────────────────────

  /deployments/{deployment}/skills/{skill}/execute:
    post:
      summary: Execute a skill on a deployment
      operationId: executeSkill
      tags: [Skills]
      parameters:
        - $ref: '#/components/parameters/DeploymentParam'
        - $ref: '#/components/parameters/SkillParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteSkillRequest'
      responses:
        '202':
          description: Skill execution initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AgentSkillExecution'
        '423':
          description: Skill execution blocked — requires approval
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  approval_id:
                    type: integer
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  # ─── Skill Scores ───────────────────────────────────────────────────────────

  /deployments/{deployment}/skill-scores:
    get:
      summary: Get skill performance scores for a deployment
      operationId: listSkillScores
      tags: [Skills]
      parameters:
        - $ref: '#/components/parameters/DeploymentParam'
        - name: period
          in: query
          description: Month period (YYYY-MM). Defaults to current month.
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
      responses:
        '200':
          description: Skill performance scores
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentSkillScore'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ─── Skill Approvals ────────────────────────────────────────────────────────

  /skill-approvals:
    get:
      summary: List pending skill approvals for the organization
      operationId: listSkillApprovals
      tags: [SkillApprovals]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, expired]
        - name: risk_level
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Paginated skill approvals
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentSkillApproval'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /skill-approvals/{approval}:
    get:
      summary: Get skill approval detail
      operationId: getSkillApproval
      tags: [SkillApprovals]
      parameters:
        - $ref: '#/components/parameters/ApprovalParam'
      responses:
        '200':
          description: Approval detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AgentSkillApproval'
        '404':
          $ref: '#/components/responses/NotFound'

  /skill-approvals/{approval}/approve:
    post:
      summary: Approve a pending skill execution
      operationId: approveSkill
      tags: [SkillApprovals]
      parameters:
        - $ref: '#/components/parameters/ApprovalParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reviewer_notes:
                  type: string
                  maxLength: 1000
      responses:
        '200':
          description: Approval granted — execution will proceed
        '422':
          description: Approval already processed or expired
        '403':
          $ref: '#/components/responses/Forbidden'

  /skill-approvals/{approval}/reject:
    post:
      summary: Reject a pending skill execution
      operationId: rejectSkill
      tags: [SkillApprovals]
      parameters:
        - $ref: '#/components/parameters/ApprovalParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reviewer_notes]
              properties:
                reviewer_notes:
                  type: string
                  maxLength: 1000
      responses:
        '200':
          description: Approval rejected — execution skipped
        '422':
          description: Approval already processed or expired
        '403':
          $ref: '#/components/responses/Forbidden'

components:

  securitySchemes:
    bearerToken:
      type: http
      scheme: bearer

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    SearchParam:
      name: search
      in: query
      schema:
        type: string
        maxLength: 100
    AgentParam:
      name: agent
      in: path
      required: true
      schema:
        type: integer
    DeploymentParam:
      name: deployment
      in: path
      required: true
      schema:
        type: integer
    SkillParam:
      name: skill
      in: path
      required: true
      schema:
        type: integer
    ApprovalParam:
      name: approval
      in: path
      required: true
      schema:
        type: integer

  responses:
    Unauthenticated:
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden — insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'

  schemas:

    ErrorResponse:
      type: object
      properties:
        message:
          type: string

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        email_verified_at:
          type: string
          format: date-time
          nullable: true

    Agent:
      type: object
      properties:
        id:
          type: integer
        uuid:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        tagline:
          type: string
        agent_type:
          type: string
          enum: [advisory, semi-autonomous, autonomous, executive_approval]
        status:
          type: string
          enum: [active, beta, deprecated, archived]
        is_enterprise_only:
          type: boolean
        base_price:
          type: number
          format: decimal
        certification_score:
          type: integer
          minimum: 0
          maximum: 100
        trust_tier:
          type: string
          enum: [uncertified, bronze, silver, gold, platinum]
        certified_at:
          type: string
          format: date-time
          nullable: true

    AgentDeployment:
      type: object
      properties:
        id:
          type: integer
        uuid:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [active, paused, decommissioned, pending, failed]
        deployment_mode:
          type: string
          enum: [advisory, semi-autonomous, autonomous, executive_approval]
        organization_id:
          type: integer
        agent_id:
          type: integer
        confidence_threshold:
          type: number
          format: float
          minimum: 0
          maximum: 100
        created_at:
          type: string
          format: date-time

    DeployAgentRequest:
      type: object
      required: [agent_id, name, deployment_mode]
      properties:
        agent_id:
          type: integer
        name:
          type: string
          maxLength: 100
        deployment_mode:
          type: string
          enum: [advisory, semi-autonomous, autonomous, executive_approval]
        custom_instructions:
          type: string
          maxLength: 5000
          nullable: true
        department_id:
          type: integer
          nullable: true
        confidence_threshold:
          type: number
          default: 75.0

    UpdateDeploymentRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        deployment_mode:
          type: string
          enum: [advisory, semi-autonomous, autonomous, executive_approval]
        custom_instructions:
          type: string
          maxLength: 5000
          nullable: true
        confidence_threshold:
          type: number
          minimum: 0
          maximum: 100

    PaginatedAgents:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Agent'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    PaginatedDeployments:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AgentDeployment'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer

    AgentSkill:
      type: object
      properties:
        id:
          type: integer
        key:
          type: string
          example: skill.finance.approve_invoice
        name:
          type: string
        description:
          type: string
        layer:
          type: string
          enum: [core, domain, extended]
        category:
          type: string
        department:
          type: string
        risk_level:
          type: string
          enum: [low, medium, high, critical]
        approval_required:
          type: boolean
        audit_required:
          type: boolean
        is_active:
          type: boolean
        confidence_score:
          type: number

    AgentSkillAssignment:
      type: object
      properties:
        id:
          type: integer
        skill_id:
          type: integer
        agent_deployment_id:
          type: integer
        organization_id:
          type: integer
        is_enabled:
          type: boolean
        config:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time

    AgentSkillExecution:
      type: object
      properties:
        id:
          type: integer
        uuid:
          type: string
          format: uuid
        skill_id:
          type: integer
        agent_deployment_id:
          type: integer
        status:
          type: string
          enum: [running, completed, failed, pending, skipped]
        trigger:
          type: string
        confidence:
          type: number
          nullable: true
        duration_ms:
          type: integer
          nullable: true
        executed_at:
          type: string
          format: date-time
          nullable: true

    AgentSkillApproval:
      type: object
      properties:
        id:
          type: integer
        uuid:
          type: string
          format: uuid
        skill_id:
          type: integer
        execution_id:
          type: integer
          nullable: true
        agent_deployment_id:
          type: integer
        organization_id:
          type: integer
        requested_by:
          type: integer
        reviewed_by:
          type: integer
          nullable: true
        status:
          type: string
          enum: [pending, approved, rejected, expired]
        risk_level:
          type: string
          enum: [low, medium, high, critical]
        justification:
          type: string
          nullable: true
        reviewer_notes:
          type: string
          nullable: true
        expires_at:
          type: string
          format: date-time
        reviewed_at:
          type: string
          format: date-time
          nullable: true

    AgentSkillScore:
      type: object
      properties:
        id:
          type: integer
        skill_id:
          type: integer
        agent_deployment_id:
          type: integer
        period:
          type: string
          example: '2025-06'
        total_executions:
          type: integer
        successful_executions:
          type: integer
        failed_executions:
          type: integer
        blocked_executions:
          type: integer
        success_rate:
          type: number
        avg_confidence:
          type: number
          nullable: true
        avg_duration_ms:
          type: number
          nullable: true

    AssignSkillRequest:
      type: object
      required: [skill_id]
      properties:
        skill_id:
          type: integer
        is_enabled:
          type: boolean
          default: true
        config:
          type: object
          nullable: true
          additionalProperties: true

    ExecuteSkillRequest:
      type: object
      required: [trigger]
      properties:
        trigger:
          type: string
          enum: [manual, on_demand, scheduled, delegated, pre_task, post_task]
        input:
          type: object
          additionalProperties: true
        justification:
          type: string
          maxLength: 500
          nullable: true
