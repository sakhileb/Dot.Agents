openapi: 3.1.0
info:
  title: Dot.Agents API
  version: 1.0.0
  description: |
    Enterprise AI Workforce Platform API.
    All endpoints require `auth:sanctum` + `org.context` middleware.
    Responses are scoped to the authenticated user's current organization.
  contact:
    name: Dot.Agents Platform
  license:
    name: Proprietary

servers:
  - url: /api/v1
    description: Production API v1

security:
  - bearerToken: []

paths:

  # ─── Authentication ─────────────────────────────────────────────────────────

  /me:
    get:
      summary: Get authenticated user
      operationId: getMe
      tags: [Auth]
      responses:
        '200':
          description: Authenticated user object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthenticated'

  # ─── Agent Catalog ──────────────────────────────────────────────────────────

  /agents:
    get:
      summary: List agent marketplace catalog
      operationId: listAgents
      tags: [Agents]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SearchParam'
        - name: department
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: agent_type
          in: query
          schema:
            type: string
            enum: [advisory, semi-autonomous, autonomous, executive_approval]
      responses:
        '200':
          description: Paginated agent list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAgents'

  /agents/{agent}:
    get:
      summary: Get agent details
      operationId: showAgent
      tags: [Agents]
      parameters:
        - $ref: '#/components/parameters/AgentParam'
      responses:
        '200':
          description: Agent detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agent'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Agent Versions ──────────────────────────────────────────────────────────

  /agents/{agent}/versions:
    parameters:
      - name: agent
        in: path
        required: true
        schema:
          type: integer
        description: Agent ID

    get:
      summary: List published versions of an agent
      description: Returns all published AgentVersion records for the specified agent, ordered by published_at descending.
      operationId: listAgentVersions
      tags: [Agents]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, published, deprecated]
          description: Filter by version status (omit for all statuses)
        - name: per_page
          in: query
          schema:
            type: integer
            default: 15
      responses:
        '200':
          description: Paginated list of agent versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAgentVersions'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      summary: Create a new agent version (draft)
      description: |
        Creates a new AgentVersion in 'draft' status, capturing the agent's
        current config and capability contract as a snapshot.
        Call the publish endpoint to promote this to the active version.
      operationId: createAgentVersion
      tags: [Agents]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [version, capabilities_snapshot]
              properties:
                version:
                  type: string
                  example: '2.0.0'
                  description: Semantic version string (must be unique per agent)
                release_notes:
                  type: string
                  example: 'Added PDF analysis capability, improved confidence scoring'
                config_snapshot:
                  type: object
                  description: Snapshot of agent configuration at time of versioning
                capabilities_snapshot:
                  type: object
                  description: Map of capability names to their contract definitions
                  additionalProperties:
                    type: object
                    required: [input_type]
                    properties:
                      input_type:
                        type: string
                        example: string
                      description:
                        type: string
      responses:
        '201':
          description: AgentVersion draft created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentVersion'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'

  /agents/{agent}/versions/{version}/publish:
    parameters:
      - name: agent
        in: path
        required: true
        schema:
          type: integer
        description: Agent ID
      - name: version
        in: path
        required: true
        schema:
          type: integer
        description: AgentVersion ID

    post:
      summary: Publish an agent version
      description: |
        Promotes a draft AgentVersion to 'published' status and marks it as the
        current version. Automatically detects breaking capability contract changes
        against the previously published version.

        When breaking changes are detected the `AgentCapabilityContractChanged`
        event is fired, triggering a governance review workflow. The response
        includes a `breaking_changes_detected` flag so callers can surface an
        appropriate warning in the UI.
      operationId: publishAgentVersion
      tags: [Agents]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Version published successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AgentVersion'
                  - type: object
                    properties:
                      breaking_changes_detected:
                        type: boolean
                        description: True when the new capabilities_snapshot introduces breaking changes
                      governance_review_id:
                        type: integer
                        nullable: true
                        description: ID of the triggered governance review, if any
        '409':
          description: Version is not in draft status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /agents/{agent}/versions/{version}/diff:
    parameters:
      - name: agent
        in: path
        required: true
        schema:
          type: integer
        description: Agent ID
      - name: version
        in: path
        required: true
        schema:
          type: integer
        description: AgentVersion ID to compare against its predecessor

    get:
      summary: Compare an agent version against its predecessor
      description: |
        Returns a diff of the capabilities_snapshot between this version and the
        immediately previous published version. Identifies added, removed, and
        modified capabilities and flags whether the changes constitute a breaking
        contract change.
      operationId: diffAgentVersions
      tags: [Agents]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Capability diff between versions
          content:
            application/json:
              schema:
                type: object
                properties:
                  version:
                    $ref: '#/components/schemas/AgentVersion'
                  previous_version:
                    $ref: '#/components/schemas/AgentVersion'
                  breaking_changes:
                    type: boolean
                    description: True if any removed or type-changed capabilities detected
                  diff:
                    type: object
                    properties:
                      added:
                        type: array
                        items:
                          type: string
                        description: Capability keys added in this version (non-breaking)
                      removed:
                        type: array
                        items:
                          type: string
                        description: Capability keys removed in this version (breaking)
                      modified:
                        type: array
                        items:
                          type: object
                          properties:
                            capability:
                              type: string
                            previous_input_type:
                              type: string
                            current_input_type:
                              type: string
                        description: Capabilities whose input_type changed (breaking)
        '401':
          $ref: '#/components/responses/Unauthenticated'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Deployments ────────────────────────────────────────────────────────────

  /deployments:
    get:
      summary: List org deployments
      operationId: listDeployments
      tags: [Deployments]
      parameters:
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Paginated deployment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDeployments'

    post:
      summary: Deploy an agent
      operationId: createDeployment
      tags: [Deployments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeployAgentRequest'
      responses:
        '201':
          description: Deployment created
          content:
            application/json:
              schema:
                properties:
                  data:
                    $ref: '#/components/schemas/AgentDeployment'
        '422':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  /deployments/{deployment}:
    get:
      summary: Get deployment
      operationId: showDeployment
      tags: [Deployments]
      parameters:
        - $ref: '#/components/parameters/DeploymentParam'
      responses:
        '200':
          description: Deployment detail
          content:
            application/json:
              schema:
                properties:
                  data:
                    $ref: '#/components/schemas/AgentDeployment'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      summary: Update deployment
      operationId: updateDeployment
      tags: [Deployments]
      parameters:
        - $ref: '#/components/parameters/DeploymentParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeploymentRequest'
      responses:
        '200':
          description: Updated deployment
          content:
            application/json:
              schema:
                properties:
                  data:
                    $ref: '#/components/schemas/AgentDeployment'

    delete:
      summary: Decommission deployment
      operationId: decommissionDeployment
      tags: [Deployments]
      parameters:
        - $ref: '#/components/parameters/DeploymentParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
      responses:
        '200':
          description: Deployment decommissioned
        '403':
          $ref: '#/components/responses/Forbidden'

  /deployments/{deployment}/pause:
    post:
      summary: Pause deployment
      operationId: pauseDeployment
      tags: [Deployments]
      parameters:
        - $ref: '#/components/parameters/DeploymentParam'
      responses:
        '200':
          description: Deployment paused

  # ─── Skill Catalog ──────────────────────────────────────────────────────────

  /skills:
    get:
      summary: List available skills catalog
      operationId: listSkills
      tags: [Skills]
      parameters:
        - name: department
          in: query
          schema:
            type: string
        - name: risk_level
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: layer
          in: query
          schema:
            type: string
            enum: [core, domain, extended]
        - name: approval_required
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Skill catalog list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentSkill'
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /skills/{skill}:
    get:
      summary: Get skill details
      operationId: getSkill
      tags: [Skills]
      parameters:
        - $ref: '#/components/parameters/SkillParam'
      responses:
        '200':
          description: Skill detail with permissions and requirements
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AgentSkill'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Deployment Skill Assignments ───────────────────────────────────────────

  /deployments/{deployment}/skills:
    get:
      summary: List skills assigned to a deployment
      operationId: listDeploymentSkills
      tags: [Skills]
      parameters:
        - $ref: '#/components/parameters/DeploymentParam'
      responses:
        '200':
          description: Skills assigned to the deployment
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentSkillAssignment'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      summary: Assign a skill to a deployment
      operationId: assignSkill
      tags: [Skills]
      parameters:
        - $ref: '#/components/parameters/DeploymentParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignSkillRequest'
      responses:
        '201':
          description: Skill assigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AgentSkillAssignment'
        '422':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  /deployments/{deployment}/skills/{skill}:
    patch:
      summary: Update skill assignment (enable/disable/configure)
      operationId: updateSkillAssignment
      tags: [Skills]
      parameters:
        - $ref: '#/components/parameters/DeploymentParam'
        - $ref: '#/components/parameters/SkillParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                is_enabled:
                  type: boolean
                config:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Assignment updated
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Skill Execution ────────────────────────────────────────────────────────

  /deployments/{deployment}/skills/{skill}/execute:
    post:
      summary: Execute a skill on a deployment
      operationId: executeSkill
      tags: [Skills]
      parameters:
        - $ref: '#/components/parameters/DeploymentParam'
        - $ref: '#/components/parameters/SkillParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteSkillRequest'
      responses:
        '202':
          description: Skill execution initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AgentSkillExecution'
        '423':
          description: Skill execution blocked — requires approval
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  approval_id:
                    type: integer
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  # ─── Skill Scores ───────────────────────────────────────────────────────────

  /deployments/{deployment}/skill-scores:
    get:
      summary: Get skill performance scores for a deployment
      operationId: listSkillScores
      tags: [Skills]
      parameters:
        - $ref: '#/components/parameters/DeploymentParam'
        - name: period
          in: query
          description: Month period (YYYY-MM). Defaults to current month.
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
      responses:
        '200':
          description: Skill performance scores
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentSkillScore'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ─── Skill Approvals ────────────────────────────────────────────────────────

  /skill-approvals:
    get:
      summary: List pending skill approvals for the organization
      operationId: listSkillApprovals
      tags: [SkillApprovals]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected, expired]
        - name: risk_level
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Paginated skill approvals
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AgentSkillApproval'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /skill-approvals/{approval}:
    get:
      summary: Get skill approval detail
      operationId: getSkillApproval
      tags: [SkillApprovals]
      parameters:
        - $ref: '#/components/parameters/ApprovalParam'
      responses:
        '200':
          description: Approval detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AgentSkillApproval'
        '404':
          $ref: '#/components/responses/NotFound'

  /skill-approvals/{approval}/approve:
    post:
      summary: Approve a pending skill execution
      operationId: approveSkill
      tags: [SkillApprovals]
      parameters:
        - $ref: '#/components/parameters/ApprovalParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reviewer_notes:
                  type: string
                  maxLength: 1000
      responses:
        '200':
          description: Approval granted — execution will proceed
        '422':
          description: Approval already processed or expired
        '403':
          $ref: '#/components/responses/Forbidden'

  /skill-approvals/{approval}/reject:
    post:
      summary: Reject a pending skill execution
      operationId: rejectSkill
      tags: [SkillApprovals]
      parameters:
        - $ref: '#/components/parameters/ApprovalParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reviewer_notes]
              properties:
                reviewer_notes:
                  type: string
                  maxLength: 1000
      responses:
        '200':
          description: Approval rejected — execution skipped
        '422':
          description: Approval already processed or expired
        '403':
          $ref: '#/components/responses/Forbidden'

  # ─── Social Commerce & Customer Success (SCCS) ─────────────────────────────

  /social/accounts:
    get:
      summary: List connected social accounts
      operationId: listSocialAccounts
      tags: [SCCS]
      responses:
        '200':
          description: Connected social accounts for the organization
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SocialAccount'
        '401':
          $ref: '#/components/responses/Unauthenticated'
    post:
      summary: Connect a social media account
      operationId: connectSocialAccount
      tags: [SCCS]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectSocialAccountRequest'
      responses:
        '201':
          description: Social account connected
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SocialAccount'
        '422':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  /social/accounts/{account}:
    get:
      summary: Get social account details
      operationId: getSocialAccount
      tags: [SCCS]
      parameters:
        - $ref: '#/components/parameters/SocialAccountParam'
      responses:
        '200':
          description: Social account with engagement metrics
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Disconnect a social account
      operationId: disconnectSocialAccount
      tags: [SCCS]
      parameters:
        - $ref: '#/components/parameters/SocialAccountParam'
      responses:
        '200':
          description: Social account disconnected

  /social/accounts/{account}/sync:
    post:
      summary: Trigger a manual sync of messages and metrics
      operationId: syncSocialAccount
      tags: [SCCS]
      parameters:
        - $ref: '#/components/parameters/SocialAccountParam'
      responses:
        '202':
          description: Sync dispatched to background queue

  /social/conversations:
    get:
      summary: List social conversations (DMs, comments, mentions)
      operationId: listSocialConversations
      tags: [SCCS]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_progress, resolved, escalated, closed]
        - name: channel
          in: query
          schema:
            type: string
            enum: [twitter, instagram, facebook, linkedin, tiktok]
        - name: intent
          in: query
          schema:
            type: string
            enum: [neutral, interested, ready_to_buy, complaint, support_request, escalation]
      responses:
        '200':
          description: Paginated social conversations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SocialConversation'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  /social/conversations/{conversation}:
    get:
      summary: Get conversation with full message thread
      operationId: getSocialConversation
      tags: [SCCS]
      parameters:
        - $ref: '#/components/parameters/SocialConversationParam'
      responses:
        '200':
          description: Conversation with messages and AI analysis
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SocialConversation'
        '404':
          $ref: '#/components/responses/NotFound'

  /social/conversations/{conversation}/respond:
    post:
      summary: Send an AI-generated response to a conversation
      operationId: respondToConversation
      tags: [SCCS]
      parameters:
        - $ref: '#/components/parameters/SocialConversationParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  maxLength: 2000
                  description: Override the AI-generated response (optional; AI drafts it if omitted)
                deployment_id:
                  type: integer
      responses:
        '202':
          description: Response dispatched to social channel
        '422':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  /social/conversations/{conversation}/escalate:
    post:
      summary: Escalate a conversation to a human agent
      operationId: escalateConversation
      tags: [SCCS]
      parameters:
        - $ref: '#/components/parameters/SocialConversationParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  maxLength: 500
                assignee_id:
                  type: integer
                  nullable: true
      responses:
        '200':
          description: Conversation escalated

  /social/conversations/{conversation}/inbound:
    post:
      summary: Receive an inbound message (webhook endpoint for social platforms)
      operationId: receiveInboundMessage
      tags: [SCCS]
      parameters:
        - $ref: '#/components/parameters/SocialConversationParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  maxLength: 5000
                sender_handle:
                  type: string
                platform_message_id:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Inbound message stored; AI job dispatched
        '422':
          $ref: '#/components/responses/ValidationError'
        '403':
          description: Prompt injection detected — message rejected

  /social/posts:
    get:
      summary: List social posts
      operationId: listSocialPosts
      tags: [SCCS]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, pending_approval, scheduled, published, failed, cancelled]
      responses:
        '200':
          description: Paginated social posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SocialPost'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      summary: Create and schedule a social post
      operationId: createSocialPost
      tags: [SCCS]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSocialPostRequest'
      responses:
        '201':
          description: Post created (queued for approval or scheduled)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SocialPost'
        '422':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  /social/posts/{post}/approve:
    post:
      summary: Approve a pending social post for publishing
      operationId: approveSocialPost
      tags: [SCCS]
      parameters:
        - $ref: '#/components/parameters/SocialPostParam'
      responses:
        '200':
          description: Post approved and scheduled
        '422':
          description: Post already published or cancelled
        '403':
          $ref: '#/components/responses/Forbidden'

  /social/leads:
    get:
      summary: List captured social leads
      operationId: listSocialLeads
      tags: [SCCS]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [new, contacted, qualified, disqualified, converted, lost]
        - name: intent
          in: query
          schema:
            type: string
            enum: [low_intent, medium_intent, high_intent, ready_to_buy]
      responses:
        '200':
          description: Paginated social leads
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SocialLead'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      summary: Manually capture a social lead
      operationId: captureSocialLead
      tags: [SCCS]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureSocialLeadRequest'
      responses:
        '201':
          description: Lead captured
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SocialLead'

  /social/leads/{lead}:
    get:
      summary: Get lead details with full qualification analysis
      operationId: getSocialLead
      tags: [SCCS]
      parameters:
        - $ref: '#/components/parameters/SocialLeadParam'
      responses:
        '200':
          description: Lead with AI qualification data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SocialLead'

  /social/leads/{lead}/qualify:
    post:
      summary: Trigger AI qualification for a lead
      operationId: qualifyLead
      tags: [SCCS]
      parameters:
        - $ref: '#/components/parameters/SocialLeadParam'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                deployment_id:
                  type: integer
                  description: SCCS agent deployment to use for qualification
      responses:
        '200':
          description: Lead qualification updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SocialLead'
                  qualification:
                    $ref: '#/components/schemas/LeadQualification'

  /social/sentiment:
    get:
      summary: Get brand sentiment analysis
      operationId: getSentimentAnalysis
      tags: [SCCS]
      parameters:
        - name: period_days
          in: query
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 365
        - name: channel
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Brand sentiment scores and trending topics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SentimentAnalysis'

  /social/conversions:
    get:
      summary: List social commerce conversions
      operationId: listSocialConversions
      tags: [SCCS]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, cancelled, refunded]
      responses:
        '200':
          description: Social conversions with revenue attribution
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SocialConversion'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  # ─── Executive Council (AEC v2.0) ───────────────────────────────────────────

  /executive-council/sessions:
    get:
      summary: List executive council deliberation sessions
      operationId: listCouncilSessions
      tags: [ExecutiveCouncil]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [deliberating, completed, failed]
        - name: session_type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated council sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ExecutiveCouncilSession'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      summary: Convene a new executive council session
      operationId: conveneCouncilSession
      tags: [ExecutiveCouncil]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_type, title, context]
              properties:
                session_type:
                  type: string
                  enum: [procurement, strategic_initiative, ai_deployment, risk_assessment, budget, other]
                title:
                  type: string
                  maxLength: 200
                context:
                  type: string
                  maxLength: 5000
                  description: Full decision context for executive deliberation
                input_data:
                  type: object
                  additionalProperties: true
                financial_threshold:
                  type: number
                  nullable: true
      responses:
        '201':
          description: Session convened (may take 30-60s for AI deliberation)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ExecutiveCouncilSession'
        '403':
          $ref: '#/components/responses/Forbidden'

  /executive-council/sessions/{session}:
    get:
      summary: Get council session with all executive recommendations
      operationId: getCouncilSession
      tags: [ExecutiveCouncil]
      parameters:
        - name: session
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Session with per-role recommendations and consensus
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ExecutiveCouncilSession'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Enterprise Brain (AEC v2.0) ────────────────────────────────────────────

  /enterprise/health:
    get:
      summary: Get composite Enterprise Health Score (8 domains)
      operationId: getEnterpriseHealth
      tags: [EnterpriseBrain]
      responses:
        '200':
          description: Enterprise health score across all 8 domains
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnterpriseHealthScore'
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /enterprise/brain/predict:
    post:
      summary: Run 30-day predictive intelligence forecast
      operationId: runPredictiveIntelligence
      tags: [EnterpriseBrain]
      responses:
        '200':
          description: Risk factors and opportunities for the next 30 days
          content:
            application/json:
              schema:
                type: object
                properties:
                  risk_factors:
                    type: array
                    items:
                      type: object
                  opportunities:
                    type: array
                    items:
                      type: object
                  prediction_confidence:
                    type: integer

  /enterprise/dna:
    get:
      summary: Get organizational DNA (Enterprise Constitution)
      operationId: getOrganizationDNA
      tags: [EnterpriseBrain]
      responses:
        '200':
          description: Organization DNA configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationDNA'
    put:
      summary: Update organizational DNA
      operationId: updateOrganizationDNA
      tags: [EnterpriseBrain]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationDNA'
      responses:
        '200':
          description: DNA updated — all agent system prompts will reflect changes within 30 minutes
        '403':
          $ref: '#/components/responses/Forbidden'

  # ─────────────────────────────────────────────────────────────────────────────
  # SKILL CATALOG — Direct execution (preview / sandbox mode)
  # ─────────────────────────────────────────────────────────────────────────────

  /skills/{key}/execute:
    post:
      summary: Execute a skill directly (sandbox / preview mode)
      description: |
        Executes a skill from the global catalog in sandbox mode without requiring an active
        AgentDeployment. Intended for skill developers and platform administrators to preview
        or validate skill behaviour before assigning to a deployment.

        Rate limited — see `ai-execution` limiter (10/min per user, 100/min per org).
      operationId: executeSkillDirect
      tags: [Skills]
      security:
        - bearerToken: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
          description: Unique skill key (e.g. `seo-analyser`, `marketing-intelligence`)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [input]
              properties:
                input:
                  type: object
                  description: Skill-specific input payload (see individual skill documentation)
                  additionalProperties: true
                context:
                  type: object
                  description: Optional execution context (organization_id, deployment_id, etc.)
                  additionalProperties: true
      responses:
        '200':
          description: Skill executed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillExecutionResult'
        '404':
          description: Skill key not found in registry
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ─────────────────────────────────────────────────────────────────────────────
  # WORKFLOWS — Automated multi-step agent workflows
  # ─────────────────────────────────────────────────────────────────────────────

  /workflows:
    get:
      summary: List workflows for the current organization
      operationId: listWorkflows
      tags: [Workflows]
      security:
        - bearerToken: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, paused, archived]
        - name: trigger_type
          in: query
          schema:
            type: string
            enum: [manual, schedule, event, webhook]
        - name: per_page
          in: query
          schema:
            type: integer
            default: 25
      responses:
        '200':
          description: Paginated list of workflows
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedWorkflows'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      summary: Create a new workflow
      operationId: createWorkflow
      tags: [Workflows]
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowCreateRequest'
      responses:
        '201':
          description: Workflow created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
        '422':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  /workflows/{workflow}:
    get:
      summary: Get a workflow by ID
      operationId: getWorkflow
      tags: [Workflows]
      security:
        - bearerToken: []
      parameters:
        - name: workflow
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Workflow detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      summary: Update a workflow
      operationId: updateWorkflow
      tags: [Workflows]
      security:
        - bearerToken: []
      parameters:
        - name: workflow
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowCreateRequest'
      responses:
        '200':
          description: Workflow updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
        '422':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      summary: Archive a workflow
      operationId: archiveWorkflow
      tags: [Workflows]
      security:
        - bearerToken: []
      parameters:
        - name: workflow
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Workflow archived
        '403':
          $ref: '#/components/responses/Forbidden'

  /workflows/{workflow}/run:
    post:
      summary: Trigger a manual workflow run
      description: |
        Queues an immediate workflow execution. Returns a run ID that can be polled
        via `/workflows/{workflow}/runs/{run}`. Async — the workflow is dispatched
        to the queue and does not block the response.
      operationId: runWorkflow
      tags: [Workflows]
      security:
        - bearerToken: []
      parameters:
        - name: workflow
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  type: object
                  description: Runtime input variables passed to the first workflow step
                  additionalProperties: true
      responses:
        '202':
          description: Workflow run queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [queued]
                  estimated_start_at:
                    type: string
                    format: date-time
        '422':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Workflow is paused or archived and cannot be run
        '403':
          $ref: '#/components/responses/Forbidden'

  /workflows/{workflow}/steps:
    get:
      summary: List the steps (nodes) of a workflow
      operationId: listWorkflowSteps
      tags: [Workflows]
      security:
        - bearerToken: []
      parameters:
        - name: workflow
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Ordered list of workflow steps
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkflowStep'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ─────────────────────────────────────────────────────────────────────────────
  # SOCIAL COMMERCE — Cart recovery, product recommendations, upsell / cross-sell
  # ─────────────────────────────────────────────────────────────────────────────

  /social/commerce/cart-recovery:
    post:
      summary: Trigger abandoned cart recovery campaign
      description: |
        Queues a personalised recovery sequence for one or more abandoned carts.
        The AI agent analyses the cart contents, customer history, and optimal
        send time before dispatching outreach via the configured channels.
      operationId: triggerCartRecovery
      tags: [SocialCommerce]
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cart_ids]
              properties:
                cart_ids:
                  type: array
                  items:
                    type: string
                  description: External cart identifiers to recover
                channels:
                  type: array
                  items:
                    type: string
                    enum: [email, sms, whatsapp, push]
                  default: [email]
                delay_minutes:
                  type: integer
                  default: 60
                  description: Minutes to wait before first outreach touch
      responses:
        '202':
          description: Cart recovery campaign queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  campaign_id:
                    type: string
                    format: uuid
                  carts_queued:
                    type: integer
                  estimated_first_touch:
                    type: string
                    format: date-time
        '422':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  /social/commerce/recommendations:
    post:
      summary: Generate personalised product recommendations
      description: |
        Returns AI-generated product recommendation sets for the given customer
        and context. Recommendations are ranked by predicted conversion probability
        and optionally filtered by inventory availability.
      operationId: generateProductRecommendations
      tags: [SocialCommerce]
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id]
              properties:
                customer_id:
                  type: string
                context:
                  type: string
                  enum: [homepage, pdp, cart, post_purchase, email]
                  default: homepage
                limit:
                  type: integer
                  default: 5
                  maximum: 20
                exclude_owned:
                  type: boolean
                  default: true
      responses:
        '200':
          description: Product recommendation set
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer_id:
                    type: string
                  context:
                    type: string
                  recommendations:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductRecommendation'
                  generated_at:
                    type: string
                    format: date-time
        '422':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  /social/commerce/upsell:
    post:
      summary: Identify upsell and cross-sell opportunities
      description: |
        Analyses the customer's current order or cart to surface targeted upsell
        (higher-tier SKU) and cross-sell (complementary SKU) opportunities.
        Returns ranked suggestions with confidence scores and recommended messaging.
      operationId: generateUpsellOpportunities
      tags: [SocialCommerce]
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, current_items]
              properties:
                customer_id:
                  type: string
                current_items:
                  type: array
                  items:
                    type: string
                  description: SKU or product IDs currently in the cart/order
                type:
                  type: string
                  enum: [upsell, cross_sell, both]
                  default: both
                limit:
                  type: integer
                  default: 3
      responses:
        '200':
          description: Upsell/cross-sell opportunity set
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer_id:
                    type: string
                  opportunities:
                    type: array
                    items:
                      $ref: '#/components/schemas/UpsellOpportunity'
                  estimated_revenue_uplift_pct:
                    type: number
        '422':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  /social/commerce/conversions:
    get:
      summary: List AI-attributed commerce conversions
      description: Returns conversions that were directly attributed to an AI agent outreach action.
      operationId: listCommerceConversions
      tags: [SocialCommerce]
      security:
        - bearerToken: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: type
          in: query
          schema:
            type: string
            enum: [cart_recovery, recommendation, upsell, cross_sell]
        - name: per_page
          in: query
          schema:
            type: integer
            default: 25
      responses:
        '200':
          description: Paginated conversion list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommerceConversion'
                  total_revenue_attributed:
                    type: number
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '403':
          $ref: '#/components/responses/Forbidden'

components:

  securitySchemes:
    bearerToken:
      type: http
      scheme: bearer

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    SearchParam:
      name: search
      in: query
      schema:
        type: string
        maxLength: 100
    AgentParam:
      name: agent
      in: path
      required: true
      schema:
        type: integer
    DeploymentParam:
      name: deployment
      in: path
      required: true
      schema:
        type: integer
    SkillParam:
      name: skill
      in: path
      required: true
      schema:
        type: integer
    ApprovalParam:
      name: approval
      in: path
      required: true
      schema:
        type: integer
    SocialAccountParam:
      name: account
      in: path
      required: true
      schema:
        type: integer
    SocialConversationParam:
      name: conversation
      in: path
      required: true
      schema:
        type: integer
    SocialPostParam:
      name: post
      in: path
      required: true
      schema:
        type: integer
    SocialLeadParam:
      name: lead
      in: path
      required: true
      schema:
        type: integer

  responses:
    Unauthenticated:
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden — insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'

  schemas:

    ErrorResponse:
      type: object
      properties:
        message:
          type: string

    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        email_verified_at:
          type: string
          format: date-time
          nullable: true

    Agent:
      type: object
      properties:
        id:
          type: integer
        uuid:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        tagline:
          type: string
        agent_type:
          type: string
          enum: [advisory, semi-autonomous, autonomous, executive_approval]
        status:
          type: string
          enum: [active, beta, deprecated, archived]
        is_enterprise_only:
          type: boolean
        base_price:
          type: number
          format: decimal
        certification_score:
          type: integer
          minimum: 0
          maximum: 100
        trust_tier:
          type: string
          enum: [uncertified, bronze, silver, gold, platinum]
        certified_at:
          type: string
          format: date-time
          nullable: true

    AgentVersion:
      type: object
      properties:
        id:
          type: integer
        agent_id:
          type: integer
        version:
          type: string
          example: '2.1.0'
        status:
          type: string
          enum: [draft, published, deprecated]
        release_notes:
          type: string
          nullable: true
        capabilities_snapshot:
          type: object
          description: Map of capability names to their contract definitions
          additionalProperties:
            type: object
            properties:
              input_type:
                type: string
              description:
                type: string
        config_snapshot:
          type: object
          nullable: true
          description: Agent configuration at time of versioning
        is_current:
          type: boolean
          description: Whether this is the currently active published version
        published_at:
          type: string
          format: date-time
          nullable: true
        deprecated_at:
          type: string
          format: date-time
          nullable: true
        created_by:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time

    PaginatedAgentVersions:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AgentVersion'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    AgentDeployment:
      type: object
      properties:
        id:
          type: integer
        uuid:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum: [active, paused, decommissioned, pending, failed]
        deployment_mode:
          type: string
          enum: [advisory, semi-autonomous, autonomous, executive_approval]
        organization_id:
          type: integer
        agent_id:
          type: integer
        confidence_threshold:
          type: number
          format: float
          minimum: 0
          maximum: 100
        created_at:
