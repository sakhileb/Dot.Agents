<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dot. Agents | Coming Soon</title>
    <meta
      name="description"
      content="Dot. Agents is preparing something purposeful. We are launching soon."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="coming-soon" role="main" aria-labelledby="title">
      <section class="card">
        <img src="dot.logos3.png" alt="Dot. Agents logo" class="logo" />
        <p class="eyebrow">Launching Soon</p>
        <h1 id="title">Something precise is on the way.</h1>
        <p class="subtitle">
          Dot. Agents is crafting a focused digital experience with care, clarity,
          and purpose. Stay close.
        </p>
        <hr class="divider" />
        <form class="notify" action="#" method="post" novalidate>
          <label class="sr-only" for="email">Email address</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="Enter your email"
            autocomplete="email"
          />
          <button type="submit">Notify me</button>
        </form>
      </section>
      <p class="footnote">Copyright 2026 Dot. Agents. All rights reserved.</p>
    </main>
  </body>
</html>
