name: Deploy

on:
  push:
    branches:
      - main        # → production
      - staging     # → staging
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]
      rollback:
        description: "Rollback to previous release?"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # Never cancel in-flight deployments

jobs:
  # ── Guard: all tests must pass before deploying ──────────────────────────────
  pre-deploy-checks:
    name: Pre-Deploy Checks
    uses: ./.github/workflows/test.yml

  determine-environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.inputs.environment }}" != "" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

  deploy:
    name: Deploy to ${{ needs.determine-environment.outputs.environment }}
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, determine-environment]
    environment: ${{ needs.determine-environment.outputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: Install dependencies (production optimized)
        run: composer install --no-dev --no-interaction --no-progress --optimize-autoloader

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Create deployment archive
        run: |
          tar -czf release.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.github' \
            --exclude='storage/logs/*.log' \
            .

      # ── Zero-downtime deployment via SSH ──────────────────────────────────
      - name: Deploy to server (zero-downtime)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            RELEASE_DIR="/var/www/dotagents/releases/$(date +%Y%m%d%H%M%S)"
            CURRENT_DIR="/var/www/dotagents/current"
            SHARED_DIR="/var/www/dotagents/shared"

            # Create release directory
            mkdir -p "$RELEASE_DIR"

            # Extract release
            tar -xzf /tmp/release.tar.gz -C "$RELEASE_DIR"

            # Link shared .env and storage
            ln -sfn "$SHARED_DIR/.env" "$RELEASE_DIR/.env"
            ln -sfn "$SHARED_DIR/storage" "$RELEASE_DIR/storage"

            # Run migrations (transactional)
            php "$RELEASE_DIR/artisan" migrate --force --no-interaction

            # Warm caches
            php "$RELEASE_DIR/artisan" config:cache
            php "$RELEASE_DIR/artisan" route:cache
            php "$RELEASE_DIR/artisan" view:cache
            php "$RELEASE_DIR/artisan" event:cache

            # Atomic cutover
            ln -sfn "$RELEASE_DIR" "$CURRENT_DIR"

            # Reload PHP-FPM (zero downtime)
            sudo systemctl reload php8.4-fpm

            # Restart queue workers gracefully
            php "$CURRENT_DIR/artisan" queue:restart

            # Health check
            sleep 3
            curl -sf http://localhost/up || exit 1

            # Prune old releases (keep last 5)
            ls -dt /var/www/dotagents/releases/*/ | tail -n +6 | xargs rm -rf

            echo "Deployment complete: $RELEASE_DIR"

      - name: Notify deployment success
        if: success()
        run: echo "Deployment to ${{ needs.determine-environment.outputs.environment }} succeeded"

      # ── Automatic rollback on failure ──────────────────────────────────────
      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            PREVIOUS=$(ls -dt /var/www/dotagents/releases/*/ | sed -n '2p')
            if [ -n "$PREVIOUS" ]; then
              ln -sfn "$PREVIOUS" /var/www/dotagents/current
              sudo systemctl reload php8.4-fpm
              php /var/www/dotagents/current/artisan queue:restart
              echo "Rolled back to: $PREVIOUS"
            fi
